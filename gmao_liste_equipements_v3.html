
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  --orange-vif:#F46A1F; --orange-clair:#FF9A57; --orange-pale:#FFF0E6; --orange-sombre:#C44E0A;
  --bleu-vif:#1A73C8; --bleu-clair:#5AACF0; --bleu-pale:#E8F3FB; --bleu-sombre:#0D4F8A; --bleu-nuit:#0B2A4A;
  --blanc:#FFFFFF; --gris-clair:#F5F6F8; --gris-moyen:#C8CDD6; --gris-texte:#5A6070; --noir-doux:#1A1F2E;
  --gradient-hero:linear-gradient(135deg,var(--bleu-nuit) 0%,var(--bleu-vif) 60%,var(--orange-vif) 100%);
  --gradient-accent:linear-gradient(90deg,var(--orange-vif),var(--orange-clair));
  --font-titre:'Sora','Segoe UI',sans-serif; --font-corps:'DM Sans','Helvetica Neue',Arial,sans-serif; --font-mono:'JetBrains Mono','Courier New',monospace;
  --text-xs:.75rem; --text-sm:.875rem; --text-base:1rem; --text-lg:1.125rem; --text-xl:1.375rem;
  --s1:.25rem; --s2:.5rem; --s3:.75rem; --s4:1rem; --s5:1.25rem; --s6:1.5rem; --s8:2rem;
  --r-sm:4px; --r-md:10px; --r-lg:18px; --r-full:9999px;
  --ombre-sm:0 2px 8px rgba(26,47,78,.10); --ombre-md:0 6px 24px rgba(26,47,78,.13); --ombre-lg:0 16px 48px rgba(26,47,78,.18);
  --ombre-orange:0 8px 24px rgba(244,106,31,.30); --ombre-bleu:0 8px 24px rgba(26,115,200,.25);
  --transition-normal:280ms cubic-bezier(.4,0,.2,1); --transition-rapide:150ms ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-corps);font-size:var(--text-base);color:var(--noir-doux);background:var(--gris-clair);-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:var(--font-titre);}
button{font-family:var(--font-corps);cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:var(--font-corps);font-size:inherit;}

/* Layout */
.page{padding:var(--s6);}

/* Header */
.header{
  background:var(--gradient-hero);
  border-radius:var(--r-lg);
  padding:var(--s6) var(--s8);
  margin-bottom:var(--s5);
  display:flex;align-items:center;justify-content:space-between;
  position:relative;overflow:hidden;
}
.header::before{content:'';position:absolute;top:-40%;right:-10%;width:260px;height:260px;background:radial-gradient(circle,rgba(244,106,31,.30) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
.header__left{position:relative;z-index:1;}
.header__badge{display:inline-flex;align-items:center;gap:var(--s2);padding:var(--s1) var(--s4);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.30);border-radius:var(--r-full);font-size:var(--text-xs);font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--orange-clair);margin-bottom:var(--s3);backdrop-filter:blur(6px);}
.header__titre{font-size:var(--text-xl);font-weight:800;color:var(--blanc);letter-spacing:-.02em;}
.header__sous{font-size:var(--text-sm);color:rgba(255,255,255,.7);margin-top:var(--s1);}
.header__actions{display:flex;gap:var(--s3);position:relative;z-index:1;}

/* Boutons */
.btn{display:inline-flex;align-items:center;gap:var(--s2);padding:var(--s3) var(--s5);border-radius:var(--r-full);font-size:var(--text-sm);font-weight:600;transition:all var(--transition-normal);cursor:pointer;white-space:nowrap;}
.btn-primaire{background:var(--gradient-accent);color:var(--blanc);box-shadow:var(--ombre-orange);}
.btn-primaire:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(244,106,31,.40);filter:brightness(1.08);}
.btn-fantome{background:transparent;color:var(--blanc);border:2px solid rgba(255,255,255,.45);}
.btn-fantome:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.8);}
.btn-secondaire{background:var(--blanc);color:var(--bleu-vif);border:2px solid var(--bleu-vif);}
.btn-secondaire:hover{background:var(--bleu-vif);color:var(--blanc);transform:translateY(-2px);box-shadow:var(--ombre-bleu);}
.btn-sm{padding:var(--s2) var(--s4);font-size:var(--text-xs);}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s4);margin-bottom:var(--s5);}
.stat{background:var(--blanc);border-radius:var(--r-lg);padding:var(--s5);box-shadow:var(--ombre-sm);border:1px solid rgba(26,115,200,.08);transition:all var(--transition-normal);}
.stat:hover{box-shadow:var(--ombre-md);transform:translateY(-2px);}
.stat__icone{width:40px;height:40px;border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;margin-bottom:var(--s3);font-size:18px;}
.stat__icone--orange{background:var(--orange-pale);color:var(--orange-vif);}
.stat__icone--bleu{background:var(--bleu-pale);color:var(--bleu-vif);}
.stat__icone--vert{background:#E6F9F0;color:#1A7A4A;}
.stat__icone--rouge{background:#FDECEA;color:#9B1C1C;}
.stat__nombre{font-family:var(--font-titre);font-size:var(--text-2xl,1.75rem);font-weight:800;color:var(--noir-doux);line-height:1;margin-bottom:var(--s1);}
.stat__label{font-size:var(--text-xs);color:var(--gris-texte);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}

/* Toolbar */
.toolbar{background:var(--blanc);border-radius:var(--r-lg);padding:var(--s4) var(--s5);box-shadow:var(--ombre-sm);border:1px solid rgba(26,115,200,.08);display:flex;gap:var(--s3);margin-bottom:var(--s4);align-items:center;flex-wrap:wrap;}
.champ__input{padding:var(--s3) var(--s4);border:1.5px solid var(--gris-moyen);border-radius:var(--r-md);background:var(--blanc);color:var(--noir-doux);font-size:var(--text-sm);transition:all var(--transition-rapide);outline:none;flex:1;min-width:180px;}
.champ__input:focus{border-color:var(--bleu-vif);box-shadow:0 0 0 3px rgba(26,115,200,.15);}
.champ__input::placeholder{color:var(--gris-moyen);}
.champ__select{padding:var(--s3) var(--s4);border:1.5px solid var(--gris-moyen);border-radius:var(--r-md);background:var(--blanc);color:var(--noir-doux);font-size:var(--text-sm);transition:all var(--transition-rapide);outline:none;min-width:150px;}
.champ__select:focus{border-color:var(--bleu-vif);box-shadow:0 0 0 3px rgba(26,115,200,.15);}
.toolbar__label{font-size:var(--text-xs);font-weight:600;color:var(--gris-texte);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}

/* Table */
.table-wrapper{background:var(--blanc);border-radius:var(--r-lg);box-shadow:var(--ombre-sm);border:1px solid rgba(26,115,200,.08);overflow:hidden;}
table{width:100%;border-collapse:collapse;font-size:var(--text-sm);table-layout:fixed;}
thead{background:var(--bleu-nuit);}
thead th{padding:var(--s3) var(--s4);text-align:left;font-family:var(--font-titre);font-size:var(--text-xs);font-weight:600;color:var(--blanc);letter-spacing:.08em;text-transform:uppercase;cursor:pointer;user-select:none;white-space:nowrap;transition:background var(--transition-rapide);}
thead th:hover{background:rgba(255,255,255,.08);}
thead th .sort-ic{margin-left:4px;opacity:.4;font-size:9px;}
thead th.sorted .sort-ic{opacity:1;}
tbody tr{border-bottom:1px solid var(--gris-clair);transition:background var(--transition-rapide);cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--bleu-pale);}
td{padding:var(--s3) var(--s4);color:var(--gris-texte);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
td.nm{color:var(--noir-doux);font-weight:600;}
td.sr{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--bleu-sombre);}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;padding:var(--s1) var(--s3);border-radius:var(--r-full);font-size:var(--text-xs);font-weight:600;}
.tag--succes{background:#E6F9F0;color:#1A7A4A;}
.tag--info{background:var(--bleu-pale);color:var(--bleu-sombre);}
.tag--alerte{background:var(--orange-pale);color:var(--orange-sombre);}
.tag--erreur{background:#FDECEA;color:#9B1C1C;}

/* Empty */
.empty-row td{text-align:center;padding:var(--s8);color:var(--gris-texte);}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:var(--s4) var(--s5);border-top:1px solid var(--gris-clair);}
.pagination__info{font-size:var(--text-xs);color:var(--gris-texte);}
.pagination__btns{display:flex;gap:var(--s2);}
.page-btn{min-width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-md);font-size:var(--text-xs);font-weight:500;color:var(--gris-texte);border:1.5px solid var(--gris-moyen);transition:all var(--transition-rapide);cursor:pointer;background:var(--blanc);}
.page-btn:hover{border-color:var(--bleu-vif);color:var(--bleu-vif);}
.page-btn:disabled{opacity:.35;cursor:not-allowed;}

/* Modal overlay (flux normal, pas fixed) */
.mo-wrap{display:none;background:rgba(11,42,74,.45);border-radius:var(--r-lg);margin-top:var(--s5);min-height:460px;align-items:center;justify-content:center;padding:var(--s6);}
.mo-wrap.open{display:flex;}
.modal{background:var(--blanc);border-radius:var(--r-lg);box-shadow:var(--ombre-lg);width:500px;max-width:100%;border:1px solid rgba(26,115,200,.12);overflow:hidden;}
.modal__header{background:var(--gradient-hero);padding:var(--s5) var(--s6);display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;}
.modal__header::before{content:'';position:absolute;top:-50%;right:-10%;width:180px;height:180px;background:radial-gradient(circle,rgba(244,106,31,.3) 0%,transparent 70%);border-radius:50%;}
.modal__header h2{font-family:var(--font-titre);font-size:var(--text-base);font-weight:700;color:var(--blanc);position:relative;z-index:1;}
.modal__close{color:rgba(255,255,255,.7);font-size:20px;background:none;border:none;cursor:pointer;position:relative;z-index:1;transition:color var(--transition-rapide);}
.modal__close:hover{color:var(--blanc);}
.modal__body{padding:var(--s6);}
.mo-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--s4);}
.field{display:flex;flex-direction:column;gap:var(--s2);}
.field.full{grid-column:1/-1;}
.field label{font-size:var(--text-xs);font-weight:600;color:var(--bleu-nuit);letter-spacing:.04em;text-transform:uppercase;}
.field input,.field select{padding:var(--s3) var(--s4);border:1.5px solid var(--gris-moyen);border-radius:var(--r-md);font-family:var(--font-corps);font-size:var(--text-sm);color:var(--noir-doux);outline:none;transition:all var(--transition-rapide);background:var(--blanc);}
.field input:focus,.field select:focus{border-color:var(--bleu-vif);box-shadow:0 0 0 3px rgba(26,115,200,.15);}
.modal__footer{padding:var(--s4) var(--s6);border-top:1px solid var(--gris-clair);display:flex;justify-content:flex-end;gap:var(--s3);align-items:center;background:var(--gris-clair);}
.btn-danger-txt{background:none;border:none;color:#D9534F;font-size:var(--text-sm);font-weight:600;cursor:pointer;margin-right:auto;display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s3);border-radius:var(--r-md);transition:background var(--transition-rapide);}
.btn-danger-txt:hover{background:#FDECEA;}

/* Séparateur */
hr.sep{border:none;border-top:1px solid var(--gris-clair);margin:var(--s4) 0;}
</style>

<h2 class="sr-only">Liste des équipements industriels – GMAO</h2>

<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header__left">
      <div class="header__badge"><i class="ti ti-building-factory-2" aria-hidden="true"></i> GMAO · Inventaire</div>
      <div class="header__titre">Équipements industriels</div>
      <div class="header__sous">Gestion et suivi du parc machine</div>
    </div>
    <div class="header__actions">
      <button class="btn btn-fantome btn-sm" onclick="exportCSV()"><i class="ti ti-download" aria-hidden="true"></i> Exporter</button>
      <button class="btn btn-primaire btn-sm" onclick="openAdd()"><i class="ti ti-plus" aria-hidden="true"></i> Ajouter</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar__label"><i class="ti ti-filter" aria-hidden="true"></i></span>
    <input class="champ__input" type="text" id="search" placeholder="Rechercher un équipement, N° série, fournisseur…" oninput="render()" />
    <select class="champ__select" id="fStatus" onchange="render()">
      <option value="">Tous les statuts</option>
      <option>Opérationnel</option>
      <option>En maintenance</option>
      <option>Alerte</option>
      <option>Arrêté</option>
    </select>
    <select class="champ__select" id="fSite" onchange="render()"><option value="">Tous les sites</option></select>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <table>
      <thead><tr id="thead"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="pagination">
      <span class="pagination__info" id="pag-info"></span>
      <div class="pagination__btns">
        <button class="page-btn" id="btn-prev" onclick="changePage(-1)"><i class="ti ti-chevron-left"></i></button>
        <button class="page-btn" id="btn-next" onclick="changePage(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="mo-wrap" id="mowrap">
    <div class="modal">
      <div class="modal__header">
        <h2 id="mo-title">Ajouter un équipement</h2>
        <button class="modal__close" onclick="closeModal()" aria-label="Fermer"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal__body">
        <div class="mo-grid">
          <div class="field full"><label>Nom de l'équipement</label><input type="text" id="f-name" placeholder="Ex : Compresseur d'air" /></div>
          <div class="field"><label>Numéro de série</label><input type="text" id="f-serial" placeholder="SN-2024-0042" /></div>
          <div class="field"><label>Fournisseur</label><input type="text" id="f-supplier" placeholder="Ex : Atlas Copco" /></div>
          <div class="field full"><label>Emplacement / Site</label><input type="text" id="f-site" placeholder="Ex : Atelier B – Zone 3" /></div>
          <div class="field"><label>Catégorie</label><input type="text" id="f-category" placeholder="Ex : Pneumatique" /></div>
          <div class="field"><label>Statut</label>
            <select id="f-status">
              <option>Opérationnel</option><option>En maintenance</option><option>Alerte</option><option>Arrêté</option>
            </select>
          </div>
          <div class="field"><label>Date d'installation</label><input type="date" id="f-date" /></div>
          <div class="field"><label>Prochaine maintenance</label><input type="date" id="f-next" /></div>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn-danger-txt" id="btn-del" onclick="deleteEquip()" style="display:none"><i class="ti ti-trash" aria-hidden="true"></i> Supprimer</button>
        <button class="btn btn-secondaire btn-sm" onclick="closeModal()">Annuler</button>
        <button class="btn btn-primaire btn-sm" onclick="saveEquip()"><i class="ti ti-check" aria-hidden="true"></i> Enregistrer</button>
      </div>
    </div>
  </div>

</div>

<script>
var COLS=[
  {key:'name',label:'Équipement',cls:'nm',w:'22%'},
  {key:'serial',label:'N° série',cls:'sr',w:'14%'},
  {key:'supplier',label:'Fournisseur',cls:'',w:'14%'},
  {key:'site',label:'Emplacement',cls:'',w:'18%'},
  {key:'category',label:'Catégorie',cls:'',w:'11%'},
  {key:'status',label:'Statut',cls:'',w:'12%'},
  {key:'date',label:'Installation',cls:'',w:'9%'},
];
var data=[
  {id:1,name:'Compresseur Atlas 200',serial:'SN-2022-0041',supplier:'Atlas Copco',site:'Atelier A – Zone 1',category:'Pneumatique',status:'Opérationnel',date:'2022-03-15',next:'2026-06-01'},
  {id:2,name:'Tour CNC Mazak QT',serial:'SN-2021-0018',supplier:'Mazak',site:'Usinage – Zone 2',category:'Machine-outil',status:'En maintenance',date:'2021-07-20',next:'2026-05-10'},
  {id:3,name:'Pont roulant 5T',serial:'SN-2019-0005',supplier:'Manitowoc',site:'Atelier B – Allée principale',category:'Manutention',status:'Opérationnel',date:'2019-11-03',next:'2026-09-15'},
  {id:4,name:'Chaudière vapeur ATTSU',serial:'SN-2020-0033',supplier:'ATTSU',site:'Chaufferie centrale',category:'Thermique',status:'Alerte',date:'2020-01-28',next:'2026-05-20'},
  {id:5,name:'Pompe centrifuge KSB',serial:'SN-2023-0077',supplier:'KSB',site:'Salle des fluides',category:'Hydraulique',status:'Opérationnel',date:'2023-04-10',next:'2027-04-10'},
  {id:6,name:'Robot soudeur Fanuc',serial:'SN-2022-0052',supplier:'Fanuc',site:'Atelier soudure',category:'Robotique',status:'Opérationnel',date:'2022-08-01',next:'2026-08-01'},
  {id:7,name:'Convoyeur à bande SEW',serial:'SN-2018-0002',supplier:'SEW-Eurodrive',site:'Ligne assemblage 1',category:'Convoyage',status:'Arrêté',date:'2018-05-12',next:''},
  {id:8,name:'Centrale hydraulique Bosch',serial:'SN-2021-0029',supplier:'Bosch Rexroth',site:'Atelier A – Zone 4',category:'Hydraulique',status:'Opérationnel',date:'2021-09-15',next:'2026-09-15'},
];
var nextId=9, sortKey='name', sortDir=1, page=1, PER=6, editId=null;

function tag(s){
  var map={Opérationnel:'succes','En maintenance':'info',Alerte:'alerte',Arrêté:'erreur'};
  var ico={Opérationnel:'ti-circle-check','En maintenance':'ti-tool',Alerte:'ti-alert-triangle',Arrêté:'ti-circle-x'};
  return '<span class="tag tag--'+(map[s]||'info')+'"><i class="ti '+(ico[s]||'ti-circle')+'" aria-hidden="true"></i>'+s+'</span>';
}

function buildHead(){
  document.getElementById('thead').innerHTML=COLS.map(function(c){
    var s=sortKey===c.key;
    return '<th style="width:'+c.w+'" onclick="sortBy(\''+c.key+'\')" class="'+(s?'sorted':'')+'">'+c.label+'<span class="sort-ic">'+(s?(sortDir===1?'▲':'▼'):'↕')+'</span></th>';
  }).join('');
}

function filtered(){
  var q=(document.getElementById('search').value||'').toLowerCase();
  var fs=document.getElementById('fStatus').value;
  var fsite=document.getElementById('fSite').value;
  return data.filter(function(d){
    return (!q||[d.name,d.serial,d.supplier,d.site,d.category].some(function(v){return (v||'').toLowerCase().indexOf(q)>-1;}))
      &&(!fs||d.status===fs)&&(!fsite||d.site===fsite);
  }).sort(function(a,b){
    var av=(a[sortKey]||'').toString().toLowerCase(), bv=(b[sortKey]||'').toString().toLowerCase();
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
}

function renderStats(){
  var total=data.length,ok=0,ma=0,wa=0,st=0;
  data.forEach(function(d){
    if(d.status==='Opérationnel')ok++;
    else if(d.status==='En maintenance')ma++;
    else if(d.status==='Alerte')wa++;
    else if(d.status==='Arrêté')st++;
  });
  var items=[
    {ico:'ti-building-factory-2',cls:'bleu',nombre:total,lbl:'Total équipements'},
    {ico:'ti-circle-check',cls:'vert',nombre:ok,lbl:'Opérationnels'},
    {ico:'ti-alert-triangle',cls:'orange',nombre:wa,lbl:'En alerte'},
    {ico:'ti-circle-x',cls:'rouge',nombre:st,lbl:'À l\'arrêt'},
  ];
  var icoMap={bleu:'--bleu',vert:'vert',orange:'orange',rouge:'rouge'};
  document.getElementById('stats').innerHTML=items.map(function(s){
    return '<div class="stat"><div class="stat__icone stat__icone--'+s.cls+'"><i class="ti '+s.ico+'" aria-hidden="true"></i></div><div class="stat__nombre">'+s.nombre+'</div><div class="stat__label">'+s.lbl+'</div></div>';
  }).join('');
}

function populateSites(){
  var sites=[];
  data.forEach(function(d){if(d.site&&sites.indexOf(d.site)<0)sites.push(d.site);});
  sites.sort();
  var cur=document.getElementById('fSite').value;
  document.getElementById('fSite').innerHTML='<option value="">Tous les sites</option>'+sites.map(function(s){return '<option value="'+s+'"'+(s===cur?' selected':'')+'>'+s+'</option>';}).join('');
}

function render(){
  buildHead();renderStats();populateSites();
  var rows=filtered(),total=rows.length;
  var pages=Math.max(1,Math.ceil(total/PER));
  if(page>pages)page=pages;
  var slice=rows.slice((page-1)*PER,page*PER);
  var tb=document.getElementById('tbody');
  if(!slice.length){
    tb.innerHTML='<tr class="empty-row"><td colspan="'+COLS.length+'"><i class="ti ti-mood-empty" style="font-size:24px;display:block;margin-bottom:8px" aria-hidden="true"></i>Aucun équipement trouvé</td></tr>';
  } else {
    tb.innerHTML=slice.map(function(row){
      return '<tr onclick="openEdit('+row.id+')">'+COLS.map(function(c){
        return '<td class="'+c.cls+'">'+(c.key==='status'?tag(row[c.key]):(row[c.key]||'—'))+'</td>';
      }).join('')+'</tr>';
    }).join('');
  }
  document.getElementById('pag-info').textContent=total?((page-1)*PER+1)+'–'+Math.min(page*PER,total)+' sur '+total+' équipements':'Aucun résultat';
  document.getElementById('btn-prev').disabled=page<=1;
  document.getElementById('btn-next').disabled=page>=pages;
}

function changePage(d){page+=d;render();}
function sortBy(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=1;}render();}

function clearForm(){
  ['name','serial','supplier','site','category','date','next'].forEach(function(f){document.getElementById('f-'+f).value='';});
  document.getElementById('f-status').value='Opérationnel';
}

function openAdd(){
  editId=null;
  document.getElementById('mo-title').textContent='Ajouter un équipement';
  document.getElementById('btn-del').style.display='none';
  clearForm();
  document.getElementById('mowrap').classList.add('open');
  setTimeout(function(){document.getElementById('f-name').focus();},50);
}

function openEdit(id){
  var eq=null;
  for(var i=0;i<data.length;i++){if(data[i].id===id){eq=data[i];break;}}
  if(!eq)return;
  editId=id;
  document.getElementById('mo-title').textContent='Modifier l\'équipement';
  document.getElementById('btn-del').style.display='';
  document.getElementById('f-name').value=eq.name||'';
  document.getElementById('f-serial').value=eq.serial||'';
  document.getElementById('f-supplier').value=eq.supplier||'';
  document.getElementById('f-site').value=eq.site||'';
  document.getElementById('f-category').value=eq.category||'';
  document.getElementById('f-status').value=eq.status||'Opérationnel';
  document.getElementById('f-date').value=eq.date||'';
  document.getElementById('f-next').value=eq.next||'';
  document.getElementById('mowrap').classList.add('open');
}

function closeModal(){document.getElementById('mowrap').classList.remove('open');}

function saveEquip(){
  var name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').focus();return;}
  var eq={name:name,serial:document.getElementById('f-serial').value.trim(),supplier:document.getElementById('f-supplier').value.trim(),site:document.getElementById('f-site').value.trim(),category:document.getElementById('f-category').value.trim(),status:document.getElementById('f-status').value,date:document.getElementById('f-date').value,next:document.getElementById('f-next').value};
  if(editId!==null){
    for(var i=0;i<data.length;i++){if(data[i].id===editId){data[i]=Object.assign({id:editId},eq);break;}}
  } else {
    eq.id=nextId++;data.push(eq);
  }
  closeModal();render();
}

function deleteEquip(){
  if(editId===null)return;
  if(!confirm('Supprimer cet équipement ?'))return;
  data=data.filter(function(d){return d.id!==editId;});
  closeModal();render();
}

function exportCSV(){
  var rows=filtered();
  var header=COLS.map(function(c){return c.label;}).join(';');
  var lines=rows.map(function(r){return COLS.map(function(c){return '"'+(r[c.key]||'').toString().replace(/"/g,'""')+'"';}).join(';');});
  var csv=[header].concat(lines).join('\n');
  var a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='equipements_gmao.csv';
  a.click();
}

render();
</script>
