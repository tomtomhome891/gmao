<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ateliers</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #F46A1F;
      --orange-pale: #FFF0E6;
      --bleu: #1A73C8;
      --bleu-pale: #E8F3FB;
      --bleu-nuit: #0B2A4A;
      --blanc: #FFFFFF;
      --gris: #F5F6F8;
      --gris-bord: #E2E5EA;
      --gris-texte: #5A6070;
      --noir: #1A1F2E;
      --vert-pale: #E6F9F0;
      --vert: #27AE60;
      --rouge-pale: #FDECEA;
      --rouge: #E74C3C;
      --font-titre: 'Sora', sans-serif;
      --font: 'DM Sans', sans-serif;
      --r: 10px;
      --r-lg: 16px;
      --shadow: 0 2px 12px rgba(11,42,74,.09);
      --shadow-md: 0 6px 24px rgba(11,42,74,.13);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--gris); color: var(--noir); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, textarea { font-family: inherit; font-size: inherit; }

    /* ── Header ── */
    .header {
      background: var(--bleu-nuit);
      padding: 1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header__logo { font-family: var(--font-titre); font-size: 1.1rem; font-weight: 800; color: var(--blanc); }
    .header__logo span { color: var(--orange); }
    .header__nav { display: flex; gap: 1.5rem; }
    .header__nav a { font-size: .82rem; color: rgba(255,255,255,.55); font-weight: 500; transition: color .2s; }
    .header__nav a:hover, .header__nav a.actif { color: var(--blanc); }
    .header__nav a.actif { color: var(--orange); }

    /* ── Page ── */
    .page { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem 3rem; }

    .page-titre {
      font-family: var(--font-titre); font-size: 1.4rem; font-weight: 800;
      color: var(--bleu-nuit); margin-bottom: 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* ── Boutons ── */
    .btn {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .5rem 1.1rem; border-radius: 999px;
      font-size: .8rem; font-weight: 600; transition: all .2s; cursor: pointer;
    }
    .btn-primaire { background: var(--orange); color: var(--blanc); box-shadow: 0 4px 12px rgba(244,106,31,.3); }
    .btn-primaire:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-secondaire { background: var(--blanc); color: var(--bleu); border: 1.5px solid var(--bleu); }
    .btn-secondaire:hover { background: var(--bleu); color: var(--blanc); }
    .btn-danger { background: var(--rouge-pale); color: var(--rouge); border: 1.5px solid #f5c6c6; }
    .btn-danger:hover { background: var(--rouge); color: var(--blanc); }
    .btn-sm { padding: .28rem .65rem; font-size: .72rem; border-radius: 6px; }

    /* ── Carte table ── */
    .card {
      background: var(--blanc); border-radius: var(--r-lg);
      box-shadow: var(--shadow); border: 1px solid var(--gris-bord); overflow: hidden;
    }
    .card-header {
      padding: 1rem 1.25rem; border-bottom: 1px solid var(--gris);
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }
    .search {
      display: flex; align-items: center; gap: .4rem;
      background: var(--gris); border: 1.5px solid transparent;
      border-radius: 999px; padding: .35rem .85rem; flex: 1; max-width: 280px;
      transition: all .2s;
    }
    .search:focus-within { border-color: var(--bleu); background: var(--blanc); box-shadow: 0 0 0 3px rgba(26,115,200,.1); }
    .search input { border: none; background: transparent; outline: none; font-size: .8rem; width: 100%; color: var(--noir); }
    .search input::placeholder { color: #bbb; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; font-size: .83rem; }
    thead { background: #F8F9FC; }
    thead th {
      padding: .7rem 1.1rem; text-align: left;
      font-size: .68rem; font-weight: 700; color: var(--gris-texte);
      letter-spacing: .07em; text-transform: uppercase;
      border-bottom: 1px solid var(--gris-bord); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--gris); transition: background .15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #F8FBFF; }
    td { padding: .8rem 1.1rem; vertical-align: middle; }
    td.nom-cell { font-weight: 600; color: var(--bleu-nuit); }
    td.code-cell { font-family: 'Courier New', monospace; font-size: .75rem; color: var(--gris-texte); }
    td.muted { color: var(--gris-texte); font-size: .8rem; }
    .actions { display: flex; gap: .35rem; }

    .empty { text-align: center; padding: 3rem; color: var(--gris-texte); font-size: .85rem; }
    .spinner-wrap { text-align: center; padding: 3rem; }
    .spinner {
      display: inline-block; width: 26px; height: 26px;
      border: 3px solid var(--gris-bord); border-top-color: var(--orange);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(11,42,74,.5);
      backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .overlay.ouvert { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--blanc); border-radius: var(--r-lg); width: 100%; max-width: 440px;
      box-shadow: var(--shadow-md);
      transform: translateY(12px) scale(.97); transition: transform .25s;
    }
    .overlay.ouvert .modal { transform: none; }
    .modal-header {
      padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--gris);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h2 { font-family: var(--font-titre); font-size: .95rem; font-weight: 700; color: var(--bleu-nuit); }
    .modal-close {
      width: 28px; height: 28px; border-radius: 50%; background: var(--gris);
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; color: var(--gris-texte); transition: all .2s;
    }
    .modal-close:hover { background: var(--rouge-pale); color: var(--rouge); }
    .modal-body { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: .85rem; }
    .modal-footer { padding: .85rem 1.5rem 1.25rem; display: flex; gap: .6rem; justify-content: flex-end; }

    .champ { display: flex; flex-direction: column; gap: .35rem; }
    .champ label { font-size: .75rem; font-weight: 600; color: var(--bleu-nuit); }
    .champ input, .champ textarea {
      padding: .55rem .8rem; border: 1.5px solid var(--gris-bord);
      border-radius: var(--r); font-size: .85rem; color: var(--noir); outline: none;
      transition: border-color .15s;
    }
    .champ input:focus, .champ textarea:focus { border-color: var(--bleu); box-shadow: 0 0 0 3px rgba(26,115,200,.1); }
    .champ textarea { min-height: 72px; resize: vertical; }
    .champ .erreur-msg { font-size: .7rem; color: var(--rouge); }
    .champ input.err { border-color: var(--rouge); }

    /* ── Confirm ── */
    .confirm-box {
      background: var(--blanc); border-radius: var(--r-lg); padding: 1.75rem;
      max-width: 340px; width: 100%; text-align: center; box-shadow: var(--shadow-md);
      transform: scale(.95); transition: transform .25s;
    }
    .overlay.ouvert .confirm-box { transform: scale(1); }
    .confirm-box .icon { font-size: 2rem; margin-bottom: .75rem; }
    .confirm-box h3 { font-family: var(--font-titre); font-size: .95rem; font-weight: 700; margin-bottom: .4rem; color: var(--bleu-nuit); }
    .confirm-box p { font-size: .8rem; color: var(--gris-texte); margin-bottom: 1.25rem; line-height: 1.5; }
    .confirm-box .actions { justify-content: center; }

    /* ── Toasts ── */
    .toasts { position: fixed; bottom: 1.25rem; right: 1.25rem; display: flex; flex-direction: column; gap: .4rem; z-index: 2000; }
    .toast {
      padding: .65rem 1rem; border-radius: var(--r); font-size: .8rem; font-weight: 500;
      display: flex; align-items: center; gap: .5rem; min-width: 220px;
      box-shadow: var(--shadow); animation: tin .25s ease;
    }
    .toast--ok  { background: var(--vert-pale); color: #1A5C35; border-left: 3px solid var(--vert); }
    .toast--err { background: var(--rouge-pale); color: #7B1A1A; border-left: 3px solid var(--rouge); }
    @keyframes tin { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:none; } }

    @media (max-width: 600px) {
      .page { padding: 0 .75rem 2rem; margin-top: 1rem; }
      .header { padding: .75rem 1rem; }
      .header__nav { display: none; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header__logo">Admin<span>Panel</span></div>
  <nav class="header__nav">
    <a href="admin-utilisateurs.html">Utilisateurs</a>
    <a href="ateliers.html" class="actif">Ateliers</a>
    <a href="#">Équipements</a>
  </nav>
</header>

<div class="page">
  <div class="page-titre">
    🔨 Ateliers
    <button class="btn btn-primaire" onclick="ouvrirCreation()">＋ Nouvel atelier</button>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="search">
        <span>🔍</span>
        <input type="text" id="recherche" placeholder="Rechercher…" oninput="filtrer()" />
      </div>
      <button class="btn btn-secondaire btn-sm" onclick="charger()">🔄 Actualiser</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Nom</th>
          <th>Code</th>
          <th>Surface (m²)</th>
          <th>Notes</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="spinner-wrap"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal création / édition -->
<div class="overlay" id="overlayForm">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitre">Nouvel atelier</h2>
      <button class="modal-close" onclick="fermer('overlayForm')">✕</button>
    </div>
    <div class="modal-body">
      <div class="champ">
        <label>Nom *</label>
        <input type="text" id="fNom" placeholder="Ex : Atelier Mécanique" />
        <span class="erreur-msg" id="eNom"></span>
      </div>
      <div class="champ">
        <label>Code</label>
        <input type="text" id="fCode" placeholder="Ex : ATL-001" style="font-family:'Courier New',monospace" />
      </div>
      <div class="champ">
        <label>Surface (m²)</label>
        <input type="number" id="fSurface" placeholder="Ex : 250" min="0" />
      </div>
      <div class="champ">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Description, remarques…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondaire" onclick="fermer('overlayForm')">Annuler</button>
      <button class="btn btn-primaire" id="btnSave" onclick="sauvegarder()">Créer</button>
    </div>
  </div>
</div>

<!-- Modal confirmation suppression -->
<div class="overlay" id="overlayConfirm">
  <div class="confirm-box">
    <div class="icon">🗑️</div>
    <h3>Supprimer cet atelier ?</h3>
    <p id="confirmTexte">Cette action est irréversible.</p>
    <div class="actions" style="display:flex;gap:.6rem;justify-content:center">
      <button class="btn btn-secondaire" onclick="fermer('overlayConfirm')">Annuler</button>
      <button class="btn btn-danger" id="btnConfirm">Supprimer</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
  const URL  = 'https://yabkcdgdyavqfenjqqpy.supabase.co';
  const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlhYmtjZGdkeWF2cWZlbmpxcXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMTQyNjMsImV4cCI6MjA5MzY5MDI2M30.4DC3Rmr_GLHegLFbB76ewJqmKFsszNnyOjcOK4EzpGs';
  const H    = { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

  let tous = [], editId = null;

  async function charger() {
    tbody().innerHTML = `<tr><td colspan="5" class="spinner-wrap"><div class="spinner"></div></td></tr>`;
    try {
      const r = await fetch(`${URL}/rest/v1/ateliers?select=*&order=nom.asc`, { headers: H });
      if (!r.ok) throw new Error(await r.text());
      tous = await r.json();
      filtrer();
    } catch(e) {
      tbody().innerHTML = `<tr><td colspan="5" class="empty">❌ ${e.message}</td></tr>`;
    }
  }

  function filtrer() {
    const q = document.getElementById('recherche').value.toLowerCase();
    const data = tous.filter(a =>
      (a.nom||'').toLowerCase().includes(q) ||
      (a.code||'').toLowerCase().includes(q) ||
      (a.notes||'').toLowerCase().includes(q)
    );
    if (!data.length) {
      tbody().innerHTML = `<tr><td colspan="5" class="empty">Aucun atelier trouvé</td></tr>`;
      return;
    }
    tbody().innerHTML = data.map(a => `
      <tr>
        <td class="nom-cell">${esc(a.nom)}</td>
        <td class="code-cell">${esc(a.code || '—')}</td>
        <td class="muted">${a.surface != null ? a.surface + ' m²' : '—'}</td>
        <td class="muted" style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.notes||'—')}</td>
        <td>
          <div class="actions">
            <button class="btn btn-secondaire btn-sm" onclick="ouvrirEdition(${a.id})">✏️ Modifier</button>
            <button class="btn btn-danger btn-sm" onclick="confirmerSuppr(${a.id}, '${esc(a.nom)}')">🗑️</button>
          </div>
        </td>
      </tr>`).join('');
  }

  function tbody() { return document.getElementById('tbody'); }

  /* ── Création ── */
  function ouvrirCreation() {
    editId = null;
    document.getElementById('modalTitre').textContent = 'Nouvel atelier';
    document.getElementById('btnSave').textContent = 'Créer';
    document.getElementById('fNom').value = '';
    document.getElementById('fCode').value = '';
    document.getElementById('fSurface').value = '';
    document.getElementById('fNotes').value = '';
    document.getElementById('eNom').textContent = '';
    document.getElementById('fNom').classList.remove('err');
    ouvrir('overlayForm');
  }

  /* ── Édition ── */
  function ouvrirEdition(id) {
    const a = tous.find(x => x.id === id);
    if (!a) return;
    editId = id;
    document.getElementById('modalTitre').textContent = 'Modifier l\'atelier';
    document.getElementById('btnSave').textContent = 'Enregistrer';
    document.getElementById('fNom').value     = a.nom || '';
    document.getElementById('fCode').value    = a.code || '';
    document.getElementById('fSurface').value = a.surface != null ? a.surface : '';
    document.getElementById('fNotes').value   = a.notes || '';
    document.getElementById('eNom').textContent = '';
    document.getElementById('fNom').classList.remove('err');
    ouvrir('overlayForm');
  }

  /* ── Sauvegarde ── */
  async function sauvegarder() {
    const nom     = document.getElementById('fNom').value.trim();
    const code    = document.getElementById('fCode').value.trim() || null;
    const surface = document.getElementById('fSurface').value !== '' ? parseFloat(document.getElementById('fSurface').value) : null;
    const notes   = document.getElementById('fNotes').value.trim() || null;

    if (!nom) {
      document.getElementById('fNom').classList.add('err');
      document.getElementById('eNom').textContent = 'Le nom est requis';
      return;
    }
    document.getElementById('fNom').classList.remove('err');
    document.getElementById('eNom').textContent = '';

    const btn = document.getElementById('btnSave');
    btn.disabled = true; btn.textContent = '⏳…';

    const payload = { nom, code, surface, notes };
    try {
      if (editId) {
        const r = await fetch(`${URL}/rest/v1/ateliers?id=eq.${editId}`, { method:'PATCH', headers: H, body: JSON.stringify(payload) });
        if (!r.ok) throw new Error(await r.text());
        toast('Atelier modifié ✓', 'ok');
      } else {
        const r = await fetch(`${URL}/rest/v1/ateliers`, { method:'POST', headers: H, body: JSON.stringify(payload) });
        if (!r.ok) throw new Error(await r.text());
        toast('Atelier créé ✓', 'ok');
      }
      fermer('overlayForm');
      charger();
    } catch(e) {
      toast('Erreur : ' + e.message, 'err');
    } finally {
      btn.disabled = false;
      btn.textContent = editId ? 'Enregistrer' : 'Créer';
    }
  }

  /* ── Suppression ── */
  function confirmerSuppr(id, nom) {
    document.getElementById('confirmTexte').textContent = `Supprimer « ${nom} » ? Cette action est irréversible.`;
    document.getElementById('btnConfirm').onclick = () => supprimer(id);
    ouvrir('overlayConfirm');
  }

  async function supprimer(id) {
    fermer('overlayConfirm');
    try {
      const r = await fetch(`${URL}/rest/v1/ateliers?id=eq.${id}`, { method:'DELETE', headers: {...H, 'Prefer':'return=minimal'} });
      if (!r.ok) throw new Error(await r.text());
      toast('Atelier supprimé', 'ok');
      charger();
    } catch(e) {
      toast('Erreur : ' + e.message, 'err');
    }
  }

  /* ── Modals ── */
  function ouvrir(id) { document.getElementById(id).classList.add('ouvert'); }
  function fermer(id) { document.getElementById(id).classList.remove('ouvert'); }
  document.querySelectorAll('.overlay').forEach(el => el.addEventListener('click', e => { if (e.target === el) fermer(el.id); }));
  document.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.overlay.ouvert').forEach(el => fermer(el.id)); });

  /* ── Toast ── */
  function toast(msg, type) {
    const el = document.createElement('div');
    el.className = `toast toast--${type}`;
    el.innerHTML = `<span>${type==='ok'?'✅':'❌'}</span><span>${msg}</span>`;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  /* ── Utils ── */
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

  charger();
</script>
</body>
</html>
